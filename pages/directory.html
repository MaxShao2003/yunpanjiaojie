<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部门通讯录.xlsx</title>
    <link rel="stylesheet" href="../styles/main.css">
    <style>
        .excel-viewer { background: var(--white); max-width: 1000px; margin: 0 auto; border: 1px solid var(--border-color); border-radius: 4px; overflow: hidden; }
        .excel-toolbar { background: var(--gray-bg); padding: 12px 16px; border-bottom: 1px solid var(--border-color); font-size: 13px; }
        .excel-table { width: 100%; border-collapse: collapse; }
        .excel-table thead { background: #d9d9d9; }
        .excel-table th { padding: 12px; text-align: left; font-weight: 600; color: #333; border: 1px solid #bfbfbf; font-size: 14px; }
        .excel-table td { padding: 12px; border: 1px solid #d9d9d9; font-size: 14px; color: #333; }
        .excel-table tbody tr:nth-child(odd) { background: #fff; }
        .excel-table tbody tr:nth-child(even) { background: #f2f2f2; }
        .excel-table tbody tr:hover { background: #e8f0ff; }
        .zh-important { font-weight: 600; color: #333; }
        .employee-id { color: #d9534f; font-weight: 600; background: rgba(217, 83, 79, 0.1); padding: 2px 6px; border-radius: 3px; }
        .remarks { background: var(--white); padding: 20px 16px; border-top: 1px solid var(--border-color); font-size: 13px; color: var(--gray-dark); line-height: 1.8; }
        .remarks p { margin-bottom: 8px; }
        .back-btn { display: inline-block; margin-bottom: 20px; }
        .back-btn a { padding: 8px 16px; background: var(--gray-bg); border: 1px solid var(--border-color); border-radius: 3px; color: var(--primary-blue); font-size: 14px; cursor: pointer; }
        .back-btn a:hover { background: var(--light-blue); }
        </style>
    <script src="../scripts/history.js"></script>
    <link rel="stylesheet" href="../styles/responsive.css">
    <link rel="stylesheet" href="../styles/mobile.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="header-left">
                <div class="logo" data-version="v1.0">鼎铭</div>
                <div class="header-title">文件预览</div>
            </div>
            <div class="header-right">
                <div class="user-info">新员工</div>
                <button class="logout-btn" onclick="App.navigateTo('login.html')">登出</button>
            </div>
        </div>

        <div class="main-wrapper">
            <aside class="sidebar">
                <nav class="sidebar-nav">
                    <li><a href="home.html" class="nav-link"><span class="sidebar-icon">📁</span> 我的文件</a></li>
                    <li><a href="public_folder.html" class="nav-link"><span class="sidebar-icon">🔓</span> 公共资料</a></li>
                    <li><a href="#" class="nav-link"><span class="sidebar-icon">🗑️</span> 回收站</a></li>
                </nav>
            </aside>

            <main class="main-content">
                <div class="back-btn">
                    <a href="public_folder.html">← 返回公共文件夹</a>
                </div>

                <div class="excel-viewer">
                    <div class="excel-toolbar">
                        📞 部门通讯录.xlsx
                    </div>

                    <table class="excel-table">
                        <thead>
                            <tr>
                                <th style="width: 15%;">姓名</th>
                                <th style="width: 20%;">部门</th>
                                <th style="width: 20%;">工号</th>
                                <th style="width: 15%;">分机</th>
                                <th style="width: 30%;">备注</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>李姐</td>
                                <td>行政人事</td>
                                <td>HR-014</td>
                                <td>8014</td>
                                <td>22:00后请勿主动外呼</td>
                            </tr>
                            <tr>
                                <td>赵宇</td>
                                <td>后期剪辑</td>
                                <td>DM-8975</span></td>
                                <td>8121</td>
                                <td>已离职</td>
                            </tr>
                            <tr>
                                <td>王强</td>
                                <td>摄影执行</td>
                                <td>DM-9012</td>
                                <td>8107</td>
                                <td>休假中</td>
                            </tr>
                            <tr>
                                <td>陈默</td>
                                <td>系统维护</td>
                                <td>IT-000</td>
                                <td>8000</td>
                                <td>请走工单</td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="remarks">
                        <p>通讯录每周一自动同步。</p>
                        <p>已离岗人员信息保留 30 日，供交接与留存使用。</p>
                    </div>
                </div>

                <div style="text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border-color); color: var(--gray-light); font-size: 13px;">
                    最后更新：2024年03月18日
                </div>
            </main>
        </div>
    </div>

    <script src="../scripts/app.js"></script>
    <script src="../scripts/puzzle.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            Puzzle.recordVisit('p09');
            localStorage.setItem('viewedDirectory', 'true');
            localStorage.setItem('hasSeenDirectory', 'true');
        });
    </script>
</body>
</html>
