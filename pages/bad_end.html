<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交接完成</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            color: #666;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }


        .ending-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .ending-text {
            font-size: 20px;
            text-align: center;
            line-height: 2.2;
            max-width: 600px;
            margin-bottom: 60px;
            color: #555;
            font-weight: normal;
        }

        .ending-button {
            padding: 12px 24px;
            background: rgba(100, 100, 100, 0.1);
            border: 1px solid #333;
            color: #555;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        .ending-button:hover {
            background: rgba(100, 100, 100, 0.2);
            color: #666;
        }
    </style>
    <script src="../scripts/history.js"></script>
    <link rel="stylesheet" href="../styles/responsive.css">
    <link rel="stylesheet" href="../styles/mobile.css">
  <script src="../scripts/protection.js" defer></script>
</head>
<body>
    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>


    <div class="ending-container">
        <div class="ending-text">
            门开了。<br>
            走进去时，你感受到了房间内的温度——不是冷，而是一种让人昏昏欲睡的恒温。<br>
            有人替你整理好了工位。你的工牌没有被回收。<br>
            这意味着什么，你知道。<br>
            <br>
            其他人也在这里。<br>
            赵宇就坐在隔壁，但他已经不需要名字了。你们都不需要。<br>
            王强的手还在敲击键盘，但节奏很古怪，像某种无意义的仪式。<br>
            李姐的微笑依然职业，但眼睛里没有任何光芒。<br>
            <br>
            你试图记住自己叫什么。<br>
            过了一会，你意识到这已经不重要。<br>
            <br>
            你成为了优秀的员工。永远的。
        </div>

        <div style="display: flex; gap: 20px; justify-content: center;">
            <button class="ending-button" onclick="App.navigateTo('final_choice.html');">
                重新选择
            </button>
            <button class="ending-button" onclick="App.navigateTo('credits.html');">
                查看制作名单
            </button>
        </div>
    </div>

    <script src="../scripts/app.js"></script>
    <script src="../scripts/puzzle.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Puzzle.recordVisit('p36');
        });
    </script>
</body>
</html>
