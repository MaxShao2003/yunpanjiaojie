<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品牌短视频脚本.docx</title>
    <!-- 某些数字组合被认为是幸运的或不幸的。这个公司偏好某一类。 -->
    <link rel="stylesheet" href="../styles/main.css">
    <style>
        .doc-viewer {
            background: var(--white);
            max-width: 900px;
            margin: 0 auto;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            overflow: hidden;
        }

        .doc-toolbar {
            background: var(--gray-bg);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
            color: var(--gray-medium);
        }

        .doc-content {
            padding: 40px 50px;
            font-family: 'Calibri', 'Segoe UI', sans-serif;
            line-height: 1.8;
            color: #333;
        }

        .doc-title {
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 30px;
            color: #333;
        }

        .doc-text {
            margin-bottom: 16px;
            font-size: 14px;
        }

        .doc-label {
            font-weight: 600;
            color: #333;
            display: inline;
        }

        .doc-speech {
            margin-left: 20px;
            padding-left: 10px;
            border-left: 2px solid #4a90e2;
            color: #333;
        }

        .doc-original {
            color: #d9534f;
            font-style: italic;
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .doc-suggestion {
            background: #fff3cd;
            border-left: 3px solid #ffc107;
            padding: 8px 12px;
            margin: 8px 0;
            font-size: 13px;
            color: #856404;
        }

        .comment-box {
            background: #f0f8ff;
            border-left: 3px solid #4a90e2;
            padding: 12px;
            margin: 16px 0;
            font-size: 13px;
            border-radius: 3px;
        }

        .comment-author {
            font-weight: 600;
            color: #4a90e2;
            margin-bottom: 4px;
        }

        .comment-text {
            color: #333;
            line-height: 1.6;
        }

        .divider {
            height: 1px;
            background: var(--divider-color);
            margin: 24px 0;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
        }

        .back-btn a {
            padding: 8px 16px;
            background: var(--gray-bg);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            color: var(--primary-blue);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .back-btn a:hover {
            background: var(--light-blue);
        }
        </style>
    <script src="../scripts/history.js"></script>
    <link rel="stylesheet" href="../styles/responsive.css">
    <link rel="stylesheet" href="../styles/mobile.css">
  <script src="../scripts/protection.js" defer></script>
</head>

            </div>

        <div class="main-wrapper">

                    <li><a href="home.html" class="nav-link"><span class="sidebar-icon">📁</span> 我的文件</a></li>
                    <li><a href="projects_folder.html" class="nav-link"><span class="sidebar-icon">📦</span> 交接项目</a></li>
                    <li><a href="#" class="nav-link"><span class="sidebar-icon">🗑️</span> 回收站</a></li>
                </nav>
            </aside>

            <main class="main-content">
                <div class="back-btn">
                    <a href="projects_folder.html">← 返回项目文件夹</a>
                </div>

                <div class="doc-viewer">

                    <div class="doc-content">

                        </div>

                        </div>

                <div style="text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border-color); color: var(--gray-light); font-size: 13px;">
                    最后修改：2024-03-15 23:47 | 赵宇

            </main>
        </div>
    </div>

    <script src="../scripts/app.js"></script>
