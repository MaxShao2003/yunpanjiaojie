<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>样本档案 - 当前交接人</title>
    <link rel="stylesheet" href="../styles/admin.css">
    <style>
    </style>
    <script src="../scripts/history.js"></script>
    <link rel="stylesheet" href="../styles/responsive.css">
    <link rel="stylesheet" href="../styles/mobile.css">
  <script src="../scripts/protection.js" defer></script>
</head>
<body style="background: #0a0a0a;">
    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>
    <div class="progress-text">第 32 / 40 页</div>

    <div class="admin-container">
        <div class="admin-header">
            <div class="admin-header-left">
                <div class="admin-logo">鼎铭</div>
                <div class="admin-title">样本档案库</div>
            </div>
            <div class="admin-header-right">
                <button class="admin-logout-btn" onclick="App.navigateTo('admin_dashboard.html');">返回</button>
            </div>
        </div>

        <div class="admin-main" style="padding: 20px;">
            <div class="admin-card">
                <div class="admin-card-header">
                    <div class="admin-card-title" style="color: #d9534f;">对象样本档案</div>
                </div>
                <div class="admin-card-content">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; color: #999; font-family: 'Courier New', monospace; font-size: 13px;">
                        <div style="padding: 12px; background: rgba(0, 0, 0, 0.5); border: 1px solid #333; border-radius: 4px;">
                            <div style="color: #666; margin-bottom: 4px;">姓名</div>
                            <div style="color: #fff; font-size: 14px; font-weight: bold;">当前交接人</div>
                        </div>
                        <div style="padding: 12px; background: rgba(0, 0, 0, 0.5); border: 1px solid #333; border-radius: 4px;">
                            <div style="color: #666; margin-bottom: 4px;">身高</div>
                            <div style="color: #fff; font-size: 14px; font-weight: bold;">182 cm</div>
                        </div>
                        <div style="padding: 12px; background: rgba(0, 0, 0, 0.5); border: 1px solid #333; border-radius: 4px;">
                            <div style="color: #666; margin-bottom: 4px;">体重</div>
                            <div style="color: #fff; font-size: 14px; font-weight: bold;">62 kg</div>
                        </div>
                        <div style="padding: 12px; background: rgba(0, 0, 0, 0.5); border: 1px solid #333; border-radius: 4px;">
                            <div style="color: #666; margin-bottom: 4px;">血型</div>
                            <div style="color: #fff; font-size: 14px; font-weight: bold;">B</div>
                        </div>
                        <div style="padding: 12px; background: rgba(0, 0, 0, 0.5); border: 1px solid #333; border-radius: 4px;">
                            <div style="color: #666; margin-bottom: 4px;">平均睡眠</div>
                            <div style="color: #fff; font-size: 14px; font-weight: bold;">4.6 h</div>
                        </div>
                        <div style="padding: 12px; background: rgba(0, 0, 0, 0.5); border: 1px solid #333; border-radius: 4px;">
                            <div style="color: #666; margin-bottom: 4px;">焦虑指数</div>
                            <div style="color: #ff7a45; font-size: 14px; font-weight: bold;">91</div>
                        </div>
                        <div style="padding: 12px; background: rgba(0, 0, 0, 0.5); border: 1px solid #333; border-radius: 4px;">
                            <div style="color: #666; margin-bottom: 4px;">适口评分</div>
                            <div style="color: #5cb85c; font-size: 14px; font-weight: bold;">A</div>
                        </div>
                        <div style="padding: 12px; background: rgba(0, 0, 0, 0.5); border: 1px solid #333; border-radius: 4px;">
                            <div style="color: #666; margin-bottom: 4px;">收割窗口</div>
                            <div style="color: #d9534f; font-size: 14px; font-weight: bold;">今夜 24:00 前</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="admin-card" style="margin-top: 20px;">
                <div class="admin-card-header">
                    <div class="admin-card-title">档案备注</div>
                </div>
                <div class="admin-card-content">
                    <div style="color: #999; font-size: 12px; line-height: 1.8;">
                        <p>该对象长期处于高压工作预期中，顺从性良好。</p>
                        <p>对制度性威胁反应明显，焦虑产出稳定。</p>
                        <p>建议在其意识到异常后立即进行面谈回收。</p>
                    </div>
                </div>
            </div>

            <div style="margin-top: 20px;">
                <button onclick="App.navigateTo('system_alert.html');" style="padding: 12px 24px; background: rgba(217, 83, 79, 0.2); border: 2px solid #d9534f; color: #d9534f; border-radius: 4px; cursor: pointer; font-size: 14px; width: 100%; transition: all 0.3s;">
                    继续
                </button>
            </div>
        </div>
    </div>

    <div id="profileLockPrompt" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1001; background: rgba(10,10,10,0.98); border: 2px solid #d9534f; border-radius: 8px; padding: 40px; text-align: center; width: 90%; max-width: 400px; display: none;">
        <div style="color: #d9534f; font-size: 16px; font-weight: bold; margin-bottom: 20px;">档案访问验证</div>
        <div style="color: #999; font-size: 13px; margin-bottom: 20px; line-height: 1.6;">输入对象批次与关键指标密码<br/>以解锁完整档案</div>
        <input id="profilePassword" type="password" placeholder="指标密码" style="width: 100%; padding: 12px; background: rgba(100,100,100,0.2); border: 1px solid #444; color: #aaa; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 14px; margin-bottom: 15px; box-sizing: border-box;" onkeydown="if(event.key==='Enter') verifyProfilePassword();">
        <button onclick="verifyProfilePassword()" style="width: 100%; padding: 12px; background: rgba(217, 83, 79, 0.3); border: 1px solid #d9534f; color: #d9534f; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.3s; font-family: 'Courier New', monospace;">确认</button>
        <div id="passwordError" style="color: #ff5555; font-size: 12px; margin-top: 10px; min-height: 16px;"></div>
    </div>

    <script src="../scripts/app.js"></script>
    <script src="../scripts/puzzle.js"></script>
    <script>
        function verifyProfilePassword() {
            const password = document.getElementById('profilePassword').value;
            const errorEl = document.getElementById('passwordError');

            if (password === 'Batch-056291182') {
                // 密码正确 - 移除模糊，启用按钮，隐藏密码框
                localStorage.setItem('profilePasswordVerified', 'true');
                document.getElementById('profileLockPrompt').style.display = 'none';

                // 移除所有内容的模糊效果
                const allCards = document.querySelectorAll('.admin-card');
                allCards.forEach(card => {
                    card.style.filter = 'none';
                    card.style.pointerEvents = 'auto';
                });

                // 启用继续按钮
                const continueBtn = document.querySelector('button[onclick*="system_alert"]');
                if (continueBtn) {
                    continueBtn.style.opacity = '1';
                    continueBtn.style.pointerEvents = 'auto';
                    continueBtn.style.cursor = 'pointer';
                }

                errorEl.textContent = '';
            } else if (password !== '') {
                errorEl.textContent = '密码错误';
                document.getElementById('profilePassword').value = '';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('adminLoggedIn') !== 'true') {
                window.location.href = 'admin_login.html';
                return;
            }

            // 权限验证 - 需要倒计时触发才能解锁P32
            const canViewProfile = localStorage.getItem('systemCountdownWarning') === 'true';

            if (!canViewProfile) {
                // 档案被锁定 - 显示模糊效果和警告
                const allCards = document.querySelectorAll('.admin-card');
                allCards.forEach(card => {
                    card.style.filter = 'blur(8px)';
                    card.style.pointerEvents = 'none';
                });

                // 添加锁定警告
                const warning = document.createElement('div');
                warning.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #d9534f; font-size: 16px; font-weight: bold; background: rgba(0,0,0,0.9); padding: 30px; border-radius: 4px; border: 2px solid #d9534f; z-index: 1000; text-align: center;';
                warning.textContent = '档案已由系统锁定\n\n需要继续观看倒计时以解锁权限';
                document.body.appendChild(warning);
                return;
            }

            // 二级验证 - 检查密码验证
            const passwordVerified = localStorage.getItem('profilePasswordVerified') === 'true';

            if (!passwordVerified) {
                // 显示密码验证对话框
                document.getElementById('profileLockPrompt').style.display = 'block';

                // 模糊所有档案内容
                const allCards = document.querySelectorAll('.admin-card');
                allCards.forEach(card => {
                    card.style.filter = 'blur(8px)';
                    card.style.pointerEvents = 'none';
                });

                // 禁用继续按钮
                const continueBtn = document.querySelector('button[onclick*="system_alert"]');
                if (continueBtn) {
                    continueBtn.style.opacity = '0.3';
                    continueBtn.style.pointerEvents = 'none';
                    continueBtn.style.cursor = 'not-allowed';
                }

                // 自动聚焦到密码输入框
                setTimeout(() => {
                    document.getElementById('profilePassword').focus();
                }, 100);
            } else {
                // 全部已解锁
                document.getElementById('profileLockPrompt').style.display = 'none';

                // 档案可见 - 触发焦虑指数警告
                const anxietyIndex = 91;
                if (anxietyIndex > 85) {
                    localStorage.setItem('systemAnxietyAlert', 'true');
                    if (typeof SecretsTracker !== 'undefined') {
                        SecretsTracker.recordDiscovery('high_anxiety_detected');
                    }
                }
            }

            Puzzle.recordVisit('p32');
        });
    </script>
</body>
</html>
