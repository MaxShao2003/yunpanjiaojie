<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访问失败 - 鼎铭文化</title>
    <link rel="stylesheet" href="../styles/main.css">
    <style>
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-container { text-align: center; max-width: 500px; padding: 40px; }
        .error-code { font-size: 120px; font-weight: 700; color: #e0e0e0; margin: 0; line-height: 1; }
        .error-title { font-size: 28px; font-weight: 600; color: #333; margin: 20px 0; }
        .error-message { font-size: 16px; color: var(--gray-dark); line-height: 1.8; margin: 20px 0; }
        .error-code-info { background: white; border: 1px solid var(--border-color); border-radius: 4px; padding: 16px; margin: 20px 0; font-family: 'Courier New', monospace; font-size: 13px; color: var(--gray-medium); }
        .code-label { font-size: 12px; color: var(--gray-light); margin-bottom: 8px; }
        .code-value { font-weight: 600; color: #333; }
        .abnormal-text { color: #d9534f; font-weight: 700; }
        .back-btn { display: inline-block; margin-top: 24px; padding: 12px 32px; background: var(--primary-blue); color: white; border: none; border-radius: 3px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.3s; }
        .back-btn:hover { background: #0052a3; }
    </style>
    <script src="../scripts/history.js"></script>
    <link rel="stylesheet" href="../styles/responsive.css">
    <link rel="stylesheet" href="../styles/mobile.css">
  <script src="../scripts/protection.js" defer></script>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-title">资源不存在或权限不足</div>
        <div class="error-message">
            很抱歉，你访问的资源不存在，或当前账号不具备查看权限。<br>
            如需继续操作，请返回上一页或联系系统维护员。
        </div>

        <div class="error-code-info">
            <div class="code-label">错误码：</div>
            <div class="code-value" data-error-code="true">DM-E404-314</div>
        </div>

        <button class="back-btn" onclick="window.history.back()">返回上一页</button>
    </div>

    <script src="../scripts/app.js"></script>
    <script src="../scripts/puzzle.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Puzzle.recordVisit('p03');
            
            const abnormalTexts = ['快逃', '别回头', '今晚别去HR办公室', '它在看'];
            const errorCodeElement = document.querySelector('[data-error-code="true"]');
            const originalText = errorCodeElement.textContent;

            setInterval(() => {
                if (Math.random() < 0.3) {
                    const randomText = abnormalTexts[Math.floor(Math.random() * abnormalTexts.length)];
                    errorCodeElement.textContent = randomText;
                    errorCodeElement.classList.add('abnormal-text');

                    setTimeout(() => {
                        errorCodeElement.textContent = originalText;
                        errorCodeElement.classList.remove('abnormal-text');
                    }, 300);
                }
            }, 2000);
        });
    </script>
</body>
</html>
