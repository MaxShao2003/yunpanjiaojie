<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>已离开系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            color: #999;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }


        .ending-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .ending-text {
            font-size: 18px;
            text-align: center;
            line-height: 2;
            max-width: 700px;
            margin-bottom: 60px;
            color: #aaa;
            font-weight: normal;
        }

        .ending-button {
            padding: 12px 24px;
            background: rgba(170, 170, 170, 0.1);
            border: 1px solid #444;
            color: #999;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        .ending-button:hover {
            background: rgba(170, 170, 170, 0.2);
            color: #aaa;
        }
    </style>
    <script src="../scripts/history.js"></script>
    <link rel="stylesheet" href="../styles/responsive.css">
    <link rel="stylesheet" href="../styles/mobile.css">
  <script src="../scripts/protection.js" defer></script>
</head>
<body>
    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>
 

    <div class="ending-container">
        <div class="ending-text">
            你拔掉网线的时候，手在颤抖。显示器很沉。<br>
            玻璃碎裂的声音比你预想的要清脆，穿透性很强。<br>
            坠落只用了三秒，但你感受到了每一秒——失重、碰撞、然后骨头的尖锐哀鸣。<br>
            很幸运，你活着。很不幸，活着反而成了更大的麻烦。<br>
            <br>
            报警电话接起来时，那边说没有这样的地址记录。<br>
            医院的医生看了你的伤，问你怎么摔的。你没法解释。<br>
            你拍下的照片，那些最有力的证据，现在只剩一片模糊的红——像被某种东西刻意覆盖了。<br>
            <br>
            没人相信你。甚至你开始怀疑自己。<br>
            也许没有那栋楼？也许一切都是幻觉？<br>
            但每当夜里的风穿过通风口，你都会无可控制地屏住呼吸。<br>
            那声音听起来有点像咀嚼。<br>
            你永远不敢回头确认。
        </div>

        <div style="display: flex; gap: 20px; justify-content: center;">
            <button class="ending-button" onclick="App.navigateTo('final_choice.html');">
                重新选择
            </button>
            <button class="ending-button" onclick="App.navigateTo('credits.html');">
                查看制作名单
            </button>
        </div>
    </div>

    <script src="../scripts/app.js"></script>
    <script src="../scripts/puzzle.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Puzzle.recordVisit('p37');
        });
    </script>
</body>
</html>
